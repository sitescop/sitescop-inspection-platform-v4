<!DOCTYPE html>
<html lang="en-AU">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SiteScop V4 | Sent Agreements</title>

<link rel="stylesheet" href="sent.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<!-- ======================================================
HEADER
====================================================== -->

<header class="top-header">

    <div class="header-container">

        <div class="header-left">

            <a href="agreements.html" class="logo">

                <span class="site">Site</span><span class="scop">Scop</span>

            </a>

            <div class="divider"></div>

            <h1>Sent Agreements</h1>

        </div>

    </div>

</header>

<!-- ======================================================
MAIN
====================================================== -->

<main class="page">

    <section class="send-card">

        <div class="card-header">

            <i class="fa-solid fa-paper-plane"></i>

            <h2>Send Client Agreement</h2>

        </div>

        <p class="intro">

            Fill in the client's contact details to send an inspection agreement.

        </p>

        <div class="form-group">

            <label>

                Client Name

            </label>

            <input
                type="text"
                id="clientName"
                placeholder="Enter client name">

        </div>

        <div class="form-group">

            <label>

                Email Address

            </label>

            <input
                type="email"
                id="clientEmail"
                placeholder="Enter email address">

        </div>

        <div class="form-group">

            <label>

                Mobile Number

            </label>

            <input
                type="tel"
                id="clientMobile"
                placeholder="Enter mobile number">

        </div>

        <div class="send-options">

            <label>

                <input
                    type="radio"
                    name="sendMethod"
                    checked>

                <span>📧 Send by Email</span>

            </label>

            <label>

                <input
                    type="radio"
                    name="sendMethod">

                <span>📱 Send by SMS</span>

            </label>

            <label>

                <input
                    type="radio"
                    name="sendMethod">

                <span>💬 Send by WhatsApp</span>

            </label>

            <label>

                <input
                    type="radio"
                    name="sendMethod">

                <span>🔗 Copy Agreement Link</span>

            </label>

        </div>

        <button
            class="send-button">

            SEND AGREEMENT

        </button>

    </section>

</main>

<footer>

    <button
        class="return-btn"
        onclick="history.back()">

        <i class="fa-solid fa-arrow-left"></i>

        Return

    </button>

</footer>

<script src="sent.js"></script>

</body>
</html>
