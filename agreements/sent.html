<!DOCTYPE html>
<html lang="en-AU">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>SiteScop V4 | Sent Agreements</title>

    <meta name="description"
          content="SiteScop Client Agreement Management">

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <link rel="stylesheet"
          href="sent.css">

</head>

<body>

<header class="top-header">

    <div class="header-container">

        <div class="logo">

            <span class="site">Site</span><span class="scop">Scop</span>

        </div>

        <h1>Sent Agreements</h1>

    </div>

</header>

<main class="page">

    <div class="page-card">

        <div class="tabs">

            <button
                id="tabSend"
                class="tab active">

                <i class="fa-solid fa-paper-plane"></i>

                Send Agreement List

            </button>

            <button
                id="tabList"
                class="tab">

                <i class="fa-solid fa-list"></i>

                Sent Agreements

            </button>

        </div>

        <!-- ========================================================= -->

        <!-- Send Agreement Tab -->

        <!-- ========================================================= -->

        <section
            id="sendPanel"
            class="tab-panel active">

        </section>

        <!-- ========================================================= -->

        <!-- Sent Agreements Tab -->

        <!-- ========================================================= -->

        <section
            id="listPanel"
            class="tab-panel">

        </section>

    </div>

</main>

<script src="sent.js"></script>

</body>

</html>
