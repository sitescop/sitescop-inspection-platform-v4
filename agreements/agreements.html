<!DOCTYPE html>
<html lang="en-AU">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Client Agreements | SiteScop V4</title>

    <meta name="description"
        content="SiteScop V4 Client Agreements Management Dashboard">

    <link rel="icon" href="../assets/favicon.ico">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- Styles -->
    <link rel="stylesheet" href="agreements.css">
</head>

<body>

    <!-- ===========================
         HEADER
    ============================ -->

    <header class="top-header">

        <div class="header-container">

            <div class="header-left">

                <a href="../index.html" class="logo">

                    <img src="../assets/logo.png"
                        alt="SiteScop Logo">

                    <div class="logo-text">
                        <span class="site">Site</span><span class="scop">Scop</span>
                    </div>

                </a>

                <div class="header-divider"></div>

                <h1>Client Agreements</h1>

            </div>

        </div>

    </header>

    <!-- ===========================
         MAIN
    ============================ -->

    <main class="dashboard">

        <section class="dashboard-grid"> 
                        <!-- Sent Agreements -->
            <article class="dashboard-card" onclick="openSent()">
                <div class="card-icon sent">
                    <i class="fa-solid fa-paper-plane"></i>
                </div>

                <div class="card-content">
                    <h2>Sent Agreements</h2>
                    <p>Waiting for client completion</p>
                </div>

                <div class="card-arrow">
                    <i class="fa-solid fa-chevron-right"></i>
                </div>
            </article>

            <!-- Received Agreements -->
            <article class="dashboard-card" onclick="openReceived()">
                <div class="card-icon received">
                    <i class="fa-solid fa-inbox"></i>
                </div>

                <div class="card-content">
                    <h2>Received Agreements</h2>
                    <p>Completed by clients</p>
                </div>

                <div class="card-arrow">
                    <i class="fa-solid fa-chevron-right"></i>
                </div>
            </article>

            <!-- Completed Agreements -->
            <article class="dashboard-card" onclick="openCompleted()">
                <div class="card-icon completed">
                    <i class="fa-solid fa-circle-check"></i>
                </div>

                <div class="card-content">
                    <h2>Completed</h2>
                    <p>Converted into inspection jobs</p>
                </div>

                <div class="card-arrow">
                    <i class="fa-solid fa-chevron-right"></i>
                </div>
            </article>

            <!-- Recycle Bin -->
            <article class="dashboard-card" onclick="openRecycle()">
                <div class="card-icon recycle">
                    <i class="fa-solid fa-trash"></i>
                </div>

                <div class="card-content">
                    <h2>Recycle Bin</h2>
                    <p>Deleted agreements</p>
                </div>

                <div class="card-arrow">
                    <i class="fa-solid fa-chevron-right"></i>
                </div>
            </article>

        </section> 
                <!-- Floating Return Button -->
        <button
            class="return-dashboard-btn"
            type="button"
            onclick="returnDashboard()"
            aria-label="Return to Dashboard">

            <i class="fa-solid fa-arrow-left"></i>
            <span>Return to Dashboard</span>

        </button>

    </main>

    <!-- JavaScript -->
    <script src="agreements.js"></script>

</body>

</html>
