<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SiteScop V4 | Client Agreements</title>

<link rel="stylesheet" href="agreements.css">

</head>

<body>

<header class="top-header">

    <div class="logo">
        <span class="site">Site</span><span class="scop">Scop</span>
        <span class="title">Client Agreements</span>
    </div>

    <button id="newAgreementBtn" class="new-btn">
        ➕ New Agreement
    </button>

</header>


<main class="dashboard">

    <div class="card" id="sentCard">
        <div class="icon">📤</div>

        <h2>Sent Agreements</h2>

        <p>Waiting for client completion</p>
    </div>


    <div class="card" id="receivedCard">

        <div class="icon">📥</div>

        <h2>Received Agreements</h2>

        <p>Completed by clients</p>

    </div>


    <div class="card" id="completedCard">

        <div class="icon">✅</div>

        <h2>Completed</h2>

        <p>Converted into inspection jobs</p>

    </div>


    <div class="card" id="recycleCard">

        <div class="icon">🗑️</div>

        <h2>Recycle Bin</h2>

        <p>Deleted agreements</p>

    </div>

</main>


<script src="agreements.js"></script>

</body>
</html>
