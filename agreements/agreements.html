<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SiteScop V4 | Client Agreements</title>

<link rel="stylesheet" href="agreements.css">

</head>

<body>

<!-- ======================================================
HEADER
====================================================== -->

<header class="header">

    <div class="logo">

        <span class="site">Site</span><span class="scop">Scop</span>

        <span class="title">
            Client Agreements
        </span>

    </div>

</header>

<!-- ======================================================
MAIN
====================================================== -->

<main class="container">

    <div class="cards">

        <!-- Sent -->

        <a href="#" class="card">

            <div class="icon">
                📤
            </div>

            <h2>Sent Agreements</h2>

            <p>
                Waiting for client completion
            </p>

        </a>


        <!-- Received -->

        <a href="#" class="card">

            <div class="icon">
                📥
            </div>

            <h2>Received Agreements</h2>

            <p>
                Completed by clients
            </p>

        </a>


        <!-- Completed -->

        <a href="#" class="card">

            <div class="icon">
                ✅
            </div>

            <h2>Completed</h2>

            <p>
                Converted into inspection jobs
            </p>

        </a>


        <!-- Recycle -->

        <a href="#" class="card">

            <div class="icon">
                🗑️
            </div>

            <h2>Recycle Bin</h2>

            <p>
                Deleted agreements
            </p>

        </a>

    </div>

</main>

<!-- ======================================================
RETURN
====================================================== -->

<a href="../index.html" class="back-button">

    ← Return to Dashboard

</a>

<script src="agreements.js"></script>

</body>
</html>
