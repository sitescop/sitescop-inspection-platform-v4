<!DOCTYPE html>
<html lang="en-AU">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>SiteScop V4 | Received Agreements</title>

    <meta name="description"
          content="SiteScop Received Agreements">

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <link rel="stylesheet"
          href="received.css">

</head>

<body>

<header class="top-header">

    <div class="header-container">

        <div class="logo">

            <span class="site">Site</span><span class="scop">Scop</span>

        </div>

        <h1>Received Agreements</h1>

    </div>

</header>

<main class="page">

    <div class="page-card">

        <div class="page-title">

            <h2>

                <i class="fa-solid fa-inbox"></i>

                Received Agreements

            </h2>

            <p>

                Client agreements that have been completed and submitted.

            </p>

        </div>

        <!-- Table added in Step 2 -->

        <section id="receivedPanel">

    <div class="table-card">

        

        <div class="table-wrapper">

            <table id="receivedTable">

                <thead>

                    <tr>

                        <th>Agreement ID</th>

                        <th>Client</th>

                        <th>Inspection</th>

                        <th>Submitted</th>

                        <th>Payment</th>

                        <th>Actions</th>

                    </tr>

                </thead>

                <tbody id="receivedTableBody">

                    <tr class="empty-row">

                        <td colspan="6">

                            No received agreements found.

                        </td>

                    </tr>

                </tbody>

            </table>

        </div>

    </div>

    <div class="return-row">

        <button
            class="return-btn"
            onclick="window.location.href='agreements.html'">

            <i class="fa-solid fa-arrow-left"></i>

            Return to Client Agreements

        </button>

    </div>

</section>

    </div>

</main>

<script src="received.js"></script>

</body>

</html>
