<style>

/* ==========================================================
   BEDROOM V3
========================================================== */

:root{

--primary:#0b63b6;
--primary-light:#edf6ff;

--green:#28a745;
--red:#dc3545;
--gold:#f4b400;

--border:#d7dde5;
--background:#f5f7fb;
--card:#ffffff;

--radius:12px;

}

*{

box-sizing:border-box;

}

body{

margin:0;
padding:15px;
font-family:Arial,Helvetica,sans-serif;
background:var(--background);

}

/* ========================================================== */

.room-card{

background:#fff;

border:1px solid var(--border);

border-radius:var(--radius);

box-shadow:0 2px 10px rgba(0,0,0,.08);

margin-bottom:20px;

overflow:hidden;

}

/* ========================================================== */

.room-title{

background:var(--primary);

color:#fff;

padding:16px 20px;

font-size:22px;

font-weight:bold;

}

/* ========================================================== */

.section-header{

display:flex;

justify-content:space-between;

align-items:center;

padding:14px 18px;

background:var(--primary-light);

font-size:18px;

font-weight:bold;

border-bottom:1px solid var(--border);

}

/* ========================================================== */

.section-body{

padding:18px;

}

/* ========================================================== */

.grid-2{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(320px,1fr));

gap:18px;

}

/* ========================================================== */

.field{

display:flex;

flex-direction:column;

gap:6px;

}

.field label{

font-weight:bold;

}

.field select,
.field input,
.field textarea{

padding:10px;

border:1px solid #ccc;

border-radius:8px;

font-size:15px;

width:100%;

}

textarea{

min-height:90px;

resize:vertical;

}

/* ========================================================== */

.checkbox-grid{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(300px,1fr));

gap:12px 24px;

}

.checkbox-grid label{

display:flex;

align-items:center;

gap:10px;

cursor:pointer;

}

/* ========================================================== */

.photo-buttons{

display:flex;

gap:10px;

flex-wrap:wrap;

}

/* ========================================================== */

.btn{

border:none;

padding:10px 18px;

border-radius:20px;

font-weight:bold;

cursor:pointer;

transition:.25s;

background:#ececec;

}

.btn-green.active{

background:var(--green);

color:#fff;

}

.btn-red.active{

background:var(--red);

color:#fff;

}

.btn-gold.active{

background:var(--gold);

color:#fff;

}

.hidden{

display:none;

}
/* ==========================================================
   BEDROOM V3 ANIMATIONS
========================================================== */

.section-body{

    transition:all .30s ease;

}

.btn{

    transition:all .25s ease;

}

.btn:hover{

    transform:translateY(-2px);

    box-shadow:0 4px 10px rgba(0,0,0,.15);

}

.btn-green.active{

    background:#28a745;

    color:#fff;

}

.btn-red.active{

    background:#dc3545;

    color:#fff;

}

.btn-gold.active{

    background:#f4b400;

    color:#fff;

}

.checkbox-grid label{

    padding:8px 12px;

    border-radius:8px;

    transition:.2s;

}

.checkbox-grid label:hover{

    background:#eef5ff;

}

.room-card{

    transition:.25s;

}

.room-card:hover{

    box-shadow:0 6px 18px rgba(0,0,0,.12);

}

.section-header{

    user-select:none;

}

textarea{

    transition:.25s;

}

textarea:focus{

    border:1px solid #0b63b6;

    box-shadow:0 0 8px rgba(11,99,182,.20);

    outline:none;

}

select:focus{

    border:1px solid #0b63b6;

    box-shadow:0 0 8px rgba(11,99,182,.20);

    outline:none;

}

input[type="checkbox"]{

    width:18px;

    height:18px;

    cursor:pointer;

}

.hidden{

    display:none !important;

}
</style>

<script>
//======================================================
// BEDROOM V3 - BUTTONS & INTERACTION
//======================================================

function setButtonGroup(group, activeButton){

    group.querySelectorAll(".btn").forEach(btn=>{
        btn.classList.remove("active");
    });

    activeButton.classList.add("active");

}

//======================================================
// ACCESS YES / NO
//======================================================

const accessYes=document.getElementById("accessYes");
const accessNo=document.getElementById("accessNo");
const accessReason=document.getElementById("accessReason");

if(accessYes && accessNo){

    accessYes.onclick=function(){

        setButtonGroup(this.parentElement,this);

        accessReason.classList.add("hidden");

    };

    accessNo.onclick=function(){

        setButtonGroup(this.parentElement,this);

        accessReason.classList.remove("hidden");

    };

}

//======================================================
// DOOR N/A
//======================================================

const doorNA=document.getElementById("doorNA");
const doorSection=document.getElementById("doorSection");

if(doorNA){

doorNA.onclick=function(){

this.classList.toggle("active");

doorSection.style.display=
this.classList.contains("active")
?"none":"block";

};

}

//======================================================
// WINDOW N/A
//======================================================

const windowNA=document.getElementById("windowNA");
const windowSection=document.getElementById("windowSection");

if(windowNA){

windowNA.onclick=function(){

this.classList.toggle("active");

windowSection.style.display=
this.classList.contains("active")
?"none":"block";

};

}

//======================================================
// WARDROBE N/A
//======================================================

const wardrobeNA=document.getElementById("wardrobeNA");
const wardrobeSection=document.getElementById("wardrobeSection");

if(wardrobeNA){

wardrobeNA.onclick=function(){

this.classList.toggle("active");

wardrobeSection.style.display=
this.classList.contains("active")
?"none":"block";

};

}

//======================================================
// HEATING NONE
//======================================================

const heatingNone=document.getElementById("heatingNone");
const heatingSection=document.getElementById("heatingSection");

if(heatingNone){

heatingNone.onclick=function(){

this.classList.toggle("active");

heatingSection.style.display=
this.classList.contains("active")
?"none":"block";

};

}

//======================================================
// SMOKE ALARM
//======================================================

const smokeYes=document.getElementById("smokeYes");
const smokeNo=document.getElementById("smokeNo");

if(smokeYes && smokeNo){

smokeYes.onclick=function(){

setButtonGroup(this.parentElement,this);

};

smokeNo.onclick=function(){

setButtonGroup(this.parentElement,this);

};

}

</script>
