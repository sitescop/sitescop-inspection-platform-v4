<style>

:root{

--primary:#0F5BA7;
--green:#2E7D32;
--red:#C62828;
--gold:#F9A825;
--border:#d9d9d9;
--card:#ffffff;
--bg:#f5f7fb;

}

body{

background:var(--bg);

font-family:Arial,Helvetica,sans-serif;

margin:0;

padding:15px;

}

.room-card{

background:#fff;

border-radius:12px;

padding:18px;

margin-bottom:20px;

box-shadow:0 3px 12px rgba(0,0,0,.10);

border:1px solid #ddd;

}

.room-title{

background:var(--primary);

color:#fff;

padding:12px 18px;

border-radius:8px;

font-size:20px;

font-weight:bold;

margin-bottom:18px;

}

.section-title{

display:flex;

justify-content:space-between;

align-items:center;

background:#edf4fc;

padding:12px 15px;

border-radius:8px;

font-weight:bold;

font-size:17px;

margin-top:18px;

margin-bottom:12px;

}

.grid2{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(280px,1fr));

gap:18px;

}

.field{

display:flex;

flex-direction:column;

}

.field label{

font-weight:bold;

margin-bottom:6px;

}

.field select,

.field input,

.field textarea{

padding:10px;

border-radius:8px;

border:1px solid #ccc;

font-size:15px;

}

textarea{

resize:vertical;

min-height:90px;

}

.action-btn{

border:none;

padding:8px 16px;

border-radius:20px;

font-weight:bold;

cursor:pointer;

background:#ececec;

transition:.25s;

}

.action-btn.active-green{

background:var(--green);

color:#fff;

}

.action-btn.active-red{

background:var(--red);

color:#fff;

}

.action-btn.active-gold{

background:var(--gold);

color:#fff;

}

.hidden{

display:none;

}

</style>



<div class="room-card">

<div class="room-title">

Bedroom Inspection

</div>



<div class="grid2">

<div class="field">

<label>

Room Type

</label>

<select>

<option>Bedroom</option>

<option>Master Bedroom</option>

<option>Guest Bedroom</option>

<option>Study</option>

<option>Nursery</option>

<option>Other</option>

</select>

</div>



<div class="field">

<label>

Access Available

</label>

<div>

<button

type="button"

class="action-btn active-green"

id="accessYes">

YES

</button>

<button

type="button"

class="action-btn"

id="accessNo">

NO

</button>

</div>

</div>

</div>



<div

id="accessReason"

class="hidden"

style="margin-top:18px;">

<div class="field">

<label>

Reason No Access

</label>

<select>

<option></option>

<option>Locked</option>

<option>Unsafe</option>

<option>Stored Items</option>

<option>Client Refused</option>

<option>Unable To Inspect</option>

<option>Other</option>

</select>

</div>

</div>

</div>

<script>
//======================================================
// BUTTON COLOURS
//======================================================

function activateButton(btn){
    const group = btn.parentElement.querySelectorAll("button");
    group.forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
}

//======================================================
// DOOR N/A
//======================================================

const doorNA=document.getElementById("doorNA");
const doorSection=document.getElementById("doorSection");

if(doorNA){
doorNA.onclick=function(){

this.classList.toggle("active");

doorSection.style.display=
this.classList.contains("active")
?"none":"block";

};
}

//======================================================
// WINDOW N/A
//======================================================

const windowNA=document.getElementById("windowNA");
const windowSection=document.getElementById("windowSection");

if(windowNA){
windowNA.onclick=function(){

this.classList.toggle("active");

windowSection.style.display=
this.classList.contains("active")
?"none":"block";

};
}

//======================================================
// WARDROBE N/A
//======================================================

const wardrobeNA=document.getElementById("wardrobeNA");
const wardrobeSection=document.getElementById("wardrobeSection");

if(wardrobeNA){
wardrobeNA.onclick=function(){

this.classList.toggle("active");

wardrobeSection.style.display=
this.classList.contains("active")
?"none":"block";

};
}

//======================================================
// HEATING NONE
//======================================================

const heatingNone=document.getElementById("heatingNone");
const heatingSection=document.getElementById("heatingSection");

if(heatingNone){
heatingNone.onclick=function(){

this.classList.toggle("active");

heatingSection.style.display=
this.classList.contains("active")
?"none":"block";

};
}

//======================================================
// ACCESS YES / NO
//======================================================

const accessYes=document.getElementById("accessYes");
const accessNo=document.getElementById("accessNo");
const noReason=document.getElementById("noAccessReason");

if(accessYes){

accessYes.onclick=function(){

activateButton(this);

noReason.style.display="none";

};

}

if(accessNo){

accessNo.onclick=function(){

activateButton(this);

noReason.style.display="block";

};

}

//======================================================
// SMOKE ALARM
//======================================================

const smokeYes=document.getElementById("smokeYes");
const smokeNo=document.getElementById("smokeNo");

if(smokeYes){

smokeYes.onclick=function(){

activateButton(this);

};

}

if(smokeNo){

smokeNo.onclick=function(){

activateButton(this);

};

}
</script>
