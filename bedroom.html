<!-- SiteScop V4 - Bedroom V3 -->

<!-- ========================================================= -->

<div class="room-card">

<div class="room-title">

Bedroom Inspection

</div>

<div class="section-body">

<div class="grid-2">

<div class="field">

<label>Room Type</label>

<select>

<option>Bedroom</option>

<option>Master Bedroom</option>

<option>Guest Bedroom</option>

<option>Study</option>

<option>Nursery</option>

<option>Other</option>

</select>

</div>

<div class="field">

<label>Access Available</label>

<div style="display:flex;gap:10px;">

<button
type="button"
id="accessYes"
class="btn btn-green active">

Yes

</button>

<button
type="button"
id="accessNo"
class="btn btn-red">

No

</button>

</div>

</div>

</div>

<div
id="accessReason"
class="hidden"
style="margin-top:20px;">

<div class="field">

<label>Reason No Access</label>

<select>

<option></option>

<option>Locked</option>

<option>Unsafe</option>

<option>Stored Items</option>

<option>Client Refused</option>

<option>Unable To Inspect</option>

<option>Other</option>

</select>

</div>

</div>

</div>

</div>
