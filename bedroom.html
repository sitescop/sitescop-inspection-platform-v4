<div class="inspection-section">

    <h2>Bedroom Inspection</h2>

    <div class="form-group">

        <label><strong>Room Type</strong></label>

        <select id="roomType">

            <option>Bedroom</option>
            <option>Master Bedroom</option>
            <option>Guest Bedroom</option>
            <option>Nursery</option>
            <option>Study</option>
            <option>Front Living Room</option>
            <option>Rear Living Room</option>
            <option>Lounge Room</option>
            <option>Family Room</option>
            <option>Theatre Room</option>
            <option>Rumpus Room</option>
            <option>Other</option>

        </select>

    </div>

    <br>

    <div class="form-group">

        <label><strong>Access Available</strong></label>

                   value="yes"

    <br>

    <div id="accessReason" style="display:none;">

        <select>

            <option>Locked</option>
            <option>Stored Items Prevent Access</option>
            <option>Unsafe</option>
            <option>No Permission</option>
            <option>Other</option>

        </select>

        <br><br>

        <textarea
            rows="3"
            placeholder="Comments"></textarea>

    </div>

    <br>

    <div class="form-group">

        <label><strong>Floor Covering</strong></label>

        <select>

            <option>Carpet</option>
            <option>Timber</option>
            <option>Laminate</option>
            <option>Hybrid</option>
            <option>Vinyl</option>
            <option>Tiles</option>
            <option>Concrete</option>
            <option>Other</option>

        </select>

    </div>

</div>

<script>

document.querySelectorAll(".accordion-header").forEach(header=>{

    header.addEventListener("click",function(){

        const current=this.nextElementSibling;

        document.querySelectorAll(".accordion-content").forEach(section=>{

            if(section!==current){

                section.style.display="none";

            }

        });

        if(current.style.display==="block"){

            current.style.display="none";

        }else{

            current.style.display="block";

        }

    });

});

document.querySelectorAll(".accordion-content").forEach(section=>{

    section.style.display="none";

});

</script>
