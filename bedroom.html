<div class="bedroom-form">

    <h2>Bedroom Inspection</h2>

    <div class="grid">

        <div class="field">
            <label>Room Type</label>
            <select>
                <option>Bedroom</option>
                <option>Master Bedroom</option>
                <option>Guest Bedroom</option>
                <option>Study</option>
                <option>Nursery</option>
            </select>
        </div>

        <div class="field">
            <label>Access</label>

            <div class="button-group">

                <button type="button"
                    class="toggle-btn active"
                    onclick="toggleAccess(this,'bedroomAccessDetails',false)">
                    Yes
                </button>

                <button type="button"
                    class="toggle-btn"
                    onclick="toggleAccess(this,'bedroomAccessDetails',true)">
                    No
                </button>

            </div>

        </div>

        <div class="field" id="bedroomAccessDetails" style="display:none;">

            <label>If No Access Why?</label>

            <select>

                <option value="">Select reason...</option>

                <option>Locked</option>

                <option>Stored Items</option>

                <option>Unsafe</option>

                <option>Restricted Access</option>

                <option>Client Request</option>

                <option>Unable to Inspect</option>

                <option>Other</option>

            </select>

        </div>

    </div>

</div>

<hr> 
<!-- ================================= -->
<!-- DOOR & DOOR JAMB -->
<!-- ================================= -->

<div class="accordion">

<div class="accordion-header">

2. Door & Door Jamb

<button
type="button"
class="toggle-btn"
onclick="toggleNA('doorSection',this)">
N/A
</button>

</div>

<div
class="accordion-content active"
id="doorSection">

<div class="check-grid">

<label><input type="checkbox"> Door Damaged</label>

<label><input type="checkbox"> Door Moisture Damage</label>

<label><input type="checkbox"> Door Paint Damage</label>

<label><input type="checkbox"> Door Frame Damage</label>

<label><input type="checkbox"> Door Jamb Damage</label>

<label><input type="checkbox"> Door Swollen</label>

<label><input type="checkbox"> Door Delaminating</label>

<label><input type="checkbox"> Door Rubbing</label>

<label><input type="checkbox"> Door Does Not Close Properly</label>

<label><input type="checkbox"> Lock Not Working</label>

<label><input type="checkbox"> Handle Not Working</label>

<label><input type="checkbox"> Door Stop Missing</label>

<label><input type="checkbox"> Security Concern</label>

</div>

<br>

<label>Comments</label>

<textarea
rows="4"
placeholder="Comments..."></textarea>

<br><br>

<div class="photo-buttons">

<button type="button">📷 Camera</button>

<button type="button">📁 Import</button>

<button type="button">🖼 Review</button>

</div>

</div>

</div>
