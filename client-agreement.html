<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>SiteScop Client Agreement</title>

    <link rel="stylesheet" href="agreement.css">

</head>

<body>

<div class="container">

    <header class="header">

        <h1>SiteScop</h1>

        <p>Building & Pest Inspection Agreement</p>

    </header>

    <section class="progress-section">

        <div class="progress-text">
            Step 1 <span id="progressText">
0% Complete
</span>of 4
        </div>

        <div class="progress-bar">

            <div class="pr<div
    class="progress-fill"
    id="progressFill">
</div>ogress-fill"></div>

        </div>

    </section>

    <!-- Client Details -->

    <section class="card">

        <h2>Client Details</h2>

        <div class="form-grid">

            <div class="form-group">
    <input
        type="text"
        id="firstName"
        required
    >
    <label for="firstName">First Name *</label>
    <small class="error"></small>
</div>

            <input type="text" placeholder="Last Name">

            <input type="tel" placeholder="Mobile">

            <input type="email" placeholder="Email">

            <select>

                <option>Select Client Type</option>

                <option>Owner</option>

                <option>Purchaser</option>

                <option>Real Estate Agent</option>

                <option>Solicitor</option>

                <option>Other</option>

            </select>

        </div>

    </section>

    <!-- Property Details -->

    <section class="card">

        <h2>Property Details</h2>

        <div class="form-grid">

            <input type="text" placeholder="Property Address">

            <input type="text" placeholder="Suburb">

            <select>

                <option>State</option>

                <option>NSW</option>
                <option>VIC</option>
                <option>QLD</option>
                <option>SA</option>
                <option>WA</option>
                <option>TAS</option>
                <option>ACT</option>
                <option>NT</option>

            </select>

            <input type="text" placeholder="Postcode">

            <select>

                <option>Property Type</option>

                <option>House</option>

                <option>Unit</option>

                <option>Townhouse</option>

                <option>Commercial</option>

            </select>

            <select>

                <option>Inspection Requested</option>

                <option>Building Inspection</option>

                <option>Pest Inspection</option>

                <option>Building & Pest Inspection</option>

            </select>

            <textarea placeholder="Comments"></textarea>

        </div>

    </section>

    <!-- Agreement -->

    <section class="card">

        <h2>Inspection Agreement</h2>

        <button class="accordion">Scope</button>

        <button class="accordion">Inspection Limitations</button>

        <button class="accordion">Terms & Conditions</button>

        <button class="accordion">Privacy Policy</button>

        <button class="accordion">Client Declaration</button>

    </section>

    <!-- Signature -->

    <section class="card">

        <h2>Signature</h2>

        <div class="signature-box">

            Signature Pad Coming Soon

        </div>

        <button class="submit-btn">

            Submit Agreement

        </button>

    </section>

</div>

<script src="agreement.js"></script>

</body>

</html>
